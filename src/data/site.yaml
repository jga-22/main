personalIntro:
  eyebrow: "Introduction"
  title: "A simple place to explain what I do and why I care about it."
  body: |
    I'm Juan Galvis from Colombia, currently based in France. I work at the intersection of engineering, product management, and digital transformation in industrial contexts.

    Most of my experience sits in industrial and operational environments, where reliability, adoption, and execution matter as much as the original idea.

    This site gives me a place to share a bit of background, a few notes, and the kinds of problems I like spending time on.

focusSection:
  eyebrow: "Approach"
  title: "I work on systems that need clarity, structure, and operational usefulness."
  intro: "The common thread across my work is simple: build things that can survive complexity without becoming vague, fragile, or theatrical."

focusAreas:
  - title: "AI with operational gravity"
    text: "I care about the part after the prototype: governance, deployment, adoption, and the conditions required for a system to stay useful."
  - title: "Complex environments"
    text: "Industrial and enterprise contexts force precision. Constraints are not a side note, they shape the product from the start."
  - title: "Execution with structure"
    text: "The strongest product decisions usually connect strategy, architecture, and delivery rather than treating them as separate conversations."

